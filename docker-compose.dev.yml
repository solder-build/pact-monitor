services:
  postgres:
    image: postgres:16-alpine
    container_name: pact-pg
    environment:
      POSTGRES_USER: pact
      POSTGRES_PASSWORD: pact
      POSTGRES_DB: pact
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pact"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
