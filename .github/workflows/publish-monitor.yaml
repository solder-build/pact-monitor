name: Publish @q3labs/pact-monitor

on:
  push:
    branches: [main]
    paths:
      - "packages/monitor/**"
      - ".github/workflows/publish-monitor.yaml"
  workflow_dispatch:

concurrency:
  group: publish-monitor
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm --filter @q3labs/pact-monitor test

      - name: Build
        run: pnpm --filter @q3labs/pact-monitor build

      - name: Check if version already published
        id: check
        working-directory: packages/monitor
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          NAME=$(node -p "require('./package.json').name")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

          # Monotonicity guard: block if the highest published version on npm
          # is strictly greater than package.json. A downgrade republish
          # (e.g., publishing 0.1.2 after 0.1.3 was released) would let
          # consumers on the "latest" tag silently regress. The guard must
          # run before the idempotency check so a rolled-back package.json
          # cannot smuggle a downgrade through the "skip if equal" path.
          LATEST_NPM=$(npm view "$NAME" version 2>/dev/null || echo "")
          if [ -n "$LATEST_NPM" ]; then
            if npx --yes semver "$LATEST_NPM" -r ">$VERSION" > /dev/null 2>&1; then
              echo "::error::Refusing to publish $NAME@$VERSION: npm latest is $LATEST_NPM (strictly greater). Bump package.json above $LATEST_NPM to proceed."
              exit 1
            fi
          fi

          if npm view "$NAME@$VERSION" version > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::$NAME@$VERSION already on npm — skipping publish."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Will publish $NAME@$VERSION."
          fi

      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        working-directory: packages/monitor
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Tag and release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NAME: ${{ steps.check.outputs.name }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          set -euo pipefail
          TAG="monitor-v${VERSION}"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git tag -a "$TAG" -m "$NAME@$VERSION"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$NAME@$VERSION" \
            --notes "Published to npm: https://www.npmjs.com/package/${NAME}/v/${VERSION}" \
            --target "$GITHUB_SHA"
