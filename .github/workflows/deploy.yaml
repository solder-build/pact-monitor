name: Deploy to Cloud Run

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: string
      image:
        description: "Full image URI (leave empty for latest)"
        required: false
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      image:
        description: "Full image URI (leave empty for latest)"
        required: false

env:
  REGION: asia-southeast1
  SERVICE_NAME: pact-monitor-backend
  AR_REPO: pact-monitor-backend
  CICD_SA: gh-pact-monitor-backend-sa

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve environment config
        id: env
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            echo "project_id=staging-apps-482206" >> $GITHUB_OUTPUT
            echo "project_number=871482515924" >> $GITHUB_OUTPUT
            echo "wif_pool=wif-staging-apps-pool" >> $GITHUB_OUTPUT
            echo "wif_provider=wif-staging-apps-provider" >> $GITHUB_OUTPUT
          else
            echo "::error::Production environment is not yet configured for pact-monitor-backend."
            exit 1
          fi

      - name: Resolve image URI
        id: img
        run: |
          if [ -n "${{ inputs.image }}" ]; then
            echo "uri=${{ inputs.image }}" >> $GITHUB_OUTPUT
          else
            echo "uri=${{ env.REGION }}-docker.pkg.dev/${{ steps.env.outputs.project_id }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Write Cloud Run env file
        run: |
          if [ "${{ inputs.environment }}" = "staging" ]; then
            printf '%s\n' "${{ secrets.ENV_STG }}" > /tmp/cloud-run-env.yaml
          else
            printf '%s\n' "${{ secrets.ENV_PROD }}" > /tmp/cloud-run-env.yaml
          fi
          # Fail fast if the secret is empty / not set
          if [ ! -s /tmp/cloud-run-env.yaml ]; then
            echo "::error::Runtime env file is empty. Check ${{ inputs.environment == 'staging' && 'ENV_STG' || 'ENV_PROD' }} secret."
            exit 1
          fi

      - uses: google-github-actions/auth@v3
        with:
          project_id: ${{ steps.env.outputs.project_id }}
          workload_identity_provider: "projects/${{ steps.env.outputs.project_number }}/locations/global/workloadIdentityPools/${{ steps.env.outputs.wif_pool }}/providers/${{ steps.env.outputs.wif_provider }}"
          service_account: "${{ env.CICD_SA }}@${{ steps.env.outputs.project_id }}.iam.gserviceaccount.com"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ steps.img.outputs.uri }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --env-vars-file /tmp/cloud-run-env.yaml

      - name: Notify Success
        if: success()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            :rocket: *[${{ inputs.environment }}] Deployed*
            Service: `${{ env.SERVICE_NAME }}` | Image: `${{ steps.img.outputs.uri }}`
            Repo: ${{ github.repository }} | Branch: ${{ github.ref_name }}
            By: ${{ github.actor }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

      - name: Notify Failure
        if: failure()
        continue-on-error: true
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: ${{ secrets.SLACK_CHANNEL_ID }}
          slack-message: |
            :x: *[${{ inputs.environment }}] Deploy Failed*
            Service: `${{ env.SERVICE_NAME }}` | Branch: ${{ github.ref_name }}
            Repo: ${{ github.repository }}
            By: ${{ github.actor }} | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
