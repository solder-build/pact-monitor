[package]
name = "pact-insurance-pinocchio"
version = "0.1.0"
description = "Pact Network on-chain parametric insurance (Pinocchio port, scaffolding)"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "pact_insurance_pinocchio"

[features]
default = []
bpf-entrypoint = []

[dependencies]
pinocchio = "0.10"
bytemuck = { version = "1.14", features = ["derive"] }

# SBF target: PDA derivation resolves to a syscall; no extra feature needed.
[target.'cfg(any(target_os = "solana", target_arch = "bpf"))'.dependencies]
solana-address = { version = "2", features = ["decode"] }

# Host target: `solana_address::Address::find_program_address` is gated on
# the `curve25519` feature for non-SBF builds (`cargo test`, `cargo check`).
[target.'cfg(not(any(target_os = "solana", target_arch = "bpf")))'.dependencies]
solana-address = { version = "2", features = ["decode", "curve25519"] }

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(target_os, values("solana"))'] }
